# XcodeGen retsepti — bulutli Mac'da `xcodegen generate` ishga tushganda
# bu fayldan MVoW.xcodeproj yaratiladi. .swift fayllar avtomatik qo'shiladi.
name: MVoW
options:
  bundleIdPrefix: uz.mentorai
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  MVoW:
    type: application
    platform: iOS
    sources:
      - path: MVoW
    info:
      path: MVoW/Info.plist
      properties:
        CFBundleDisplayName: M·VoW
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSMicrophoneUsageDescription: "Murabbiyga ovozli va'da va suhbat uchun mikrofon kerak."
        NSCalendarsUsageDescription: "Kun tartibini kalendaring bilan moslashtirish uchun."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uz.mentorai.focus
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
